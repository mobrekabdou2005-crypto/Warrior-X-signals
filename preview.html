<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warrior X signals Live Preview</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      background-color: #0b0f19;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .glass-panel {
      background-color: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(51, 65, 85, 0.5);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon {
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'buy-green': '#10b981',
            'sell-red': '#ef4444',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // SVG Icons
    const ActivityIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-6 h-6 text-white" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
    const ArrowUpRight = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-3.5 h-3.5" viewBox="0 0 24 24"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>;
    const ArrowDownRight = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-3.5 h-3.5" viewBox="0 0 24 24"><path d="M7 7l9.2 9.2M17 7v10H7"/></svg>;
    const LineChartIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-6 h-6 text-emerald-400" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
    const BarChartIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-6 h-6 text-blue-400" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const ShieldIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-6 h-6 text-purple-400" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>;
    const ClockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="icon w-4 h-4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

    function StatCard({ title, value, icon, trend }) {
      return (
        <div className="glass-panel p-6 rounded-2xl relative overflow-hidden group hover:-translate-y-1 transition-transform duration-300">
          <div className="flex justify-between items-start mb-4">
            <div className="p-3 bg-slate-900/50 rounded-xl border border-slate-700/50 group-hover:bg-slate-800 transition-colors">
              {icon}
            </div>
            <span className="text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded-full">{trend}</span>
          </div>
          <h3 className="text-slate-400 text-sm font-medium mb-1">{title}</h3>
          <p className="text-3xl font-bold text-white tracking-tight">{value}</p>
        </div>
      );
    }

    function App() {
      const [signals, setSignals] = useState([]);
      const [stats, setStats] = useState({ total: 0, winRate: 0, activePairs: 0 });
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('ALL');

      useEffect(() => {
        // Mock data fetch to simulate API loading
        setTimeout(() => {
          const mock = [
            { id: 1, symbol: 'XAUUSD', signal_type: 'BUY', price: 2030.45, timestamp: new Date().toISOString() },
            { id: 2, symbol: 'EURUSD', signal_type: 'SELL', price: 1.0845, timestamp: new Date(Date.now() - 3600000).toISOString() },
            { id: 3, symbol: 'BTCUSDT', signal_type: 'BUY', price: 64200.00, timestamp: new Date(Date.now() - 7200000).toISOString() },
            { id: 4, symbol: 'GBPUSD', signal_type: 'SELL', price: 1.2530, timestamp: new Date(Date.now() - 14400000).toISOString() },
            { id: 5, symbol: 'XAUUSD', signal_type: 'BUY', price: 2028.10, timestamp: new Date(Date.now() - 86400000).toISOString() },
            { id: 6, symbol: 'ETHUSDT', signal_type: 'SELL', price: 3050.50, timestamp: new Date(Date.now() - 96400000).toISOString() }
          ];
          setSignals(mock);
          setStats({ total: mock.length, activePairs: new Set(mock.map(m=>m.symbol)).size, winRate: 68.5 });
          setLoading(false);
        }, 800);
      }, []);

      const filteredSignals = filter === 'ALL' ? signals : signals.filter(s => s.signal_type === filter);

      return (
        <div className="min-h-screen p-6 font-inter flex flex-col items-center">
          
          <header className="w-full max-w-6xl mb-10 flex justify-between items-center animate-fade-in">
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <ActivityIcon />
              </div>
              <div>
                <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                  Warrior X signals
                </h1>
                <p className="text-sm text-slate-400 font-medium tracking-wide">Automated Webhook Integration</p>
              </div>
            </div>
            
            <div className="flex items-center gap-2 glass-panel px-4 py-2 rounded-full cursor-pointer hover:bg-slate-800/80 transition" onClick={() => alert('This is a local preview with Mock Data. Deploy the Backend and Frontend folders to a server to connect live databases.')}>
              <div className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div>
              <span className="text-sm font-medium text-slate-300">
                Preview Mode (Double Click Executed)
              </span>
            </div>
          </header>

          <div className="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 animate-fade-in" style={{animationDelay: '0.1s'}}>
            <StatCard title="Win Rate" value={`${stats.winRate}%`} icon={<LineChartIcon />} trend="+2.4%" />
            <StatCard title="Total Signals" value={stats.total} icon={<BarChartIcon />} trend="+12 this week" />
            <StatCard title="Active Pairs" value={stats.activePairs} icon={<ShieldIcon />} trend="Stable" />
          </div>

          <div className="w-full max-w-6xl glass-panel rounded-2xl p-6 relative overflow-hidden animate-fade-in" style={{animationDelay: '0.2s'}}>
            <div className="absolute top-0 right-0 -m-20 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 -m-20 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl pointer-events-none"></div>

            <div className="flex justify-between items-end mb-6 relative z-10">
              <div>
                <h2 className="text-xl font-bold text-white mb-1">Recent Signals</h2>
                <p className="text-sm text-slate-400">Live feed preview (Mock Data)</p>
              </div>
              
              <div className="flex bg-slate-900/50 p-1 rounded-lg border border-slate-700/50">
                {['ALL', 'BUY', 'SELL'].map(f => (
                  <button 
                    key={f}
                    onClick={() => setFilter(f)}
                    className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all duration-300 ${filter === f ? 'bg-slate-700 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}
                  >
                    {f}
                  </button>
                ))}
              </div>
            </div>

            <div className="overflow-x-auto relative z-10">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="text-xs uppercase text-slate-400 border-b border-slate-700/50">
                    <th className="pb-3 pl-4 font-semibold">Pair</th>
                    <th className="pb-3 font-semibold">Signal</th>
                    <th className="pb-3 font-semibold">Entry Price</th>
                    <th className="pb-3 font-semibold">Time</th>
                    <th className="pb-3 pr-4 text-right font-semibold">Status</th>
                  </tr>
                </thead>
                <tbody className="text-sm">
                  {loading ? (
                    <tr><td colSpan="5" className="py-8 text-center text-slate-400">Loading signals...</td></tr>
                  ) : filteredSignals.length === 0 ? (
                    <tr><td colSpan="5" className="py-8 text-center text-slate-400">No signals found.</td></tr>
                  ) : (
                    filteredSignals.map((signal, idx) => (
                      <tr key={signal.id || idx} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors animate-fade-in" style={{animationDelay: `${idx * 0.05}s`}}>
                        <td className="py-4 pl-4 font-bold text-white flex items-center gap-2">
                          <img src={`https://s2.coinmarketcap.com/static/img/coins/64x64/1.png`} className="w-5 h-5 rounded-full object-contain bg-slate-800"  onError={(e) => e.target.style.display='none'} alt="" />
                          {signal.symbol}
                        </td>
                        <td className="py-4">
                          <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-bold ${signal.signal_type === 'BUY' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}`}>
                            {signal.signal_type === 'BUY' ? <ArrowUpRight /> : <ArrowDownRight />}
                            {signal.signal_type}
                          </span>
                        </td>
                        <td className="py-4 font-mono text-slate-300">${signal.price}</td>
                        <td className="py-4 text-slate-400 flex items-center gap-2">
                           <ClockIcon /> 
                           {new Date(signal.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </td>
                        <td className="py-4 pr-4 text-right">
                          <span className="text-xs font-medium bg-blue-500/10 text-blue-400 px-2.5 py-1 rounded-full border border-blue-500/20 shadow-[0_0_10px_rgba(59,130,246,0.2)]">Active</span>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
